name: Build Android APK
on:
  push:
    branches: ['main']
    paths: ['yuuna/**']
  pull_request:
    branches: ['main']
    paths: ['yuuna/**']
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-java@v2
      with:
        distribution: 'zulu'
        java-version: '11'
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.13.5'
    - run: flutter pub get
      working-directory: yuuna
    - run: flutter pub run build_runner build --delete-conflicting-outputs
      working-directory: yuuna
    - run: flutter pub run slang
      working-directory: yuuna
    - run: flutter build apk --target-platform=android-arm64 --shrink --obfuscate --split-debug-info=build/debug-info --tree-shake-icons --split-per-abi
      working-directory: yuuna
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: jidoujisho2-arm64
        path: yuuna/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
